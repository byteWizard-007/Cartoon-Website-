<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Multiverse Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glass-card fade-up" style="width: 100%; max-width: 400px; text-align: center;">
        <div class="logo-portal" style="margin: 0 auto 1.5rem auto; background: conic-gradient(from 0deg, var(--neon-green), var(--neon-blue), var(--neon-purple), var(--neon-green));"></div>
        <h2 class="title-glow" style="margin-bottom: 2rem;">Register Hero</h2>
        <form action="profile.html">
            <input type="text" placeholder="Hero Name" required style="width: 100%; padding: 12px; margin-bottom: 1rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px;">
            <input type="email" placeholder="Hero Email" required style="width: 100%; padding: 12px; margin-bottom: 1rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px;">
            <input type="password" placeholder="Passcode" required style="width: 100%; padding: 12px; margin-bottom: 2rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Core</button>
        </form>
        <p style="margin-top: 1.5rem; color: #888;">Already registered? <a href="login.html" style="color: var(--neon-purple);">Login here</a></p>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
