<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Multiverse Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar" class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-portal"></div>
                MULTIVERSE <span class="title-glow">HUB</span>
            </a>
            <ul id="nav-links" class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="hub.html">Universes</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>
    <section class="hero" style="min-height: 80vh; align-items: center; justify-content: center; display: flex;">
        <div class="container fade-up" style="max-width: 600px; text-align: center;">
            <h1 class="title-glow" style="font-size: 4rem;">Transmit Signal</h1>
            <p style="color: #aaa; margin-bottom: 2rem;">Send a trans-dimensional message to the Hub overseers.</p>
            <form class="glass-card" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" placeholder="Your Universe Origin" required style="padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white;">
                <input type="email" placeholder="Dimensional Comm-Link (Email)" required style="padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white;">
                <textarea rows="5" placeholder="Message content..." required style="padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; resize: none;"></textarea>
                <button class="btn btn-primary">Transmit</button>
            </form>
        </div>
    </section>
</body>
</html>
